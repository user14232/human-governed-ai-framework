version: v1
id: default_workflow

responsibility: >
  Deterministic, auditable primary delivery workflow as an explicit state machine.
  This file defines sequencing and required artifacts only. It does not contain domain logic.

inputs:
  project_mandatory:
    - domain_scope.md
    - domain_rules.md
    - source_policy.md
    - glossary.md
    - architecture_contract.md
  project_optional:
    - data_model.md
    - evaluation_criteria.md
    - goldstandard_knowledge.md

invariants_reference:
  - contracts/system_invariants.md
approval_record:
  artifact: decision_log.yaml
  schema: ../artifacts/schemas/decision_log.schema.yaml
  notes: >
    Any transition that lists `human_approval` requires corresponding explicit entries
    in `decision_log.yaml` referencing the approved artifacts (no implicit approvals).

states:
  - INIT
  - PLANNING
  - ARCH_CHECK
  - TEST_DESIGN
  - BRANCH_READY
  - IMPLEMENTING
  - TESTING
  - REVIEWING
  - ACCEPTED
  - ACCEPTED_WITH_DEBT
  - FAILED

transitions:
  - from: INIT
    to: PLANNING
    requires:
      inputs_present: true

  - from: INIT
    to: FAILED
    requires:
      inputs_present: false

  - from: PLANNING
    to: ARCH_CHECK
    requires:
      artifacts:
        - change_intent.yaml
        - implementation_plan.yaml
        - design_tradeoffs.md
        - decision_log.yaml
      human_approval:
        - implementation_plan.yaml
        - design_tradeoffs.md

  - from: ARCH_CHECK
    to: TEST_DESIGN
    requires:
      artifacts:
        - arch_review_record.md
      conditions:
        arch_review_outcome: PASS
    notes: >
      ARCH_CHECK is a governance gate. `arch_review_record.md` is required evidence that the
      architecture review occurred. If outcome is CHANGE_REQUIRED, the workflow is blocked until:
      (1) `architecture_change_proposal.md` is produced and approved via `decision_log.yaml`, and
      (2) a new `arch_review_record.md` with outcome PASS is produced.
      See `contracts/runtime_contract.md` Section 8.4 for the rework model.

  - from: TEST_DESIGN
    to: BRANCH_READY
    requires:
      artifacts:
        - test_design.yaml
        - decision_log.yaml
      human_approval:
        - test_design.yaml

  - from: BRANCH_READY
    to: IMPLEMENTING
    requires:
      artifacts:
        - branch_status.md
    notes: >
      Repository/branch mechanics are tool-agnostic; the framework only captures intent and results.
      `branch_status.md` is the required evidence that an isolated change surface has been prepared.

  - from: IMPLEMENTING
    to: TESTING
    notes: >
      Implementation occurs in the codebase; the framework records outcomes through existing artifacts
      (tests and review), not via additional implicit artifacts.
      `implementation_summary.md` is optional trace; it is not a gate requirement but is strongly
      recommended for auditability and reviewer input.

  - from: TESTING
    to: REVIEWING
    requires:
      artifacts:
        - test_report.json

  - from: REVIEWING
    to: ACCEPTED
    requires:
      artifacts:
        - review_result.md
      conditions:
        review_outcome: ACCEPTED

  - from: REVIEWING
    to: ACCEPTED_WITH_DEBT
    requires:
      artifacts:
        - review_result.md
        - decision_log.yaml
      conditions:
        review_outcome: ACCEPTED_WITH_DEBT
      human_approval:
        - review_result.md

  - from: REVIEWING
    to: FAILED
    requires:
      artifacts:
        - review_result.md
      conditions:
        review_outcome: FAILED

artifacts_used:
  # Delivery-cycle contracts (schemas live under artifacts/schemas/)
  - change_intent.yaml
  - implementation_plan.yaml
  - design_tradeoffs.md
  - arch_review_record.md
  - test_design.yaml
  - branch_status.md
  - test_report.json
  - review_result.md
  - run_metrics.json         # optional trace
  - decision_log.yaml
  # Governance / auxiliary
  - architecture_change_proposal.md  # only if ARCH_CHECK outcome is CHANGE_REQUIRED
  - implementation_summary.md        # optional trace
  - test_change_summary.md           # optional trace

post_workflow_activities:
  release:
    note: >
      Release (packaging, tagging, publishing) is a separate, optional activity after ACCEPTED or
      ACCEPTED_WITH_DEBT. It is governed by `workflow/release_workflow.yaml`, which defines the
      normative release lifecycle as an explicit state machine. A project must explicitly start a
      release run; release is not automatic.
    normative_since: v1.1

  knowledge_extraction:
    note: >
      Knowledge extraction from completed delivery run artifacts is an optional but recommended
      post-run activity. It should occur after the run reaches a terminal state
      (ACCEPTED, ACCEPTED_WITH_DEBT, or FAILED). Extraction produces `knowledge_record` artifacts
      from run evidence (review findings, decisions, tradeoffs, architecture changes).
      Knowledge extraction is not a gate requirement in this workflow; it is governed by
      `docs/knowledge_query_contract.md` Section 7.
    triggering_states:
      - ACCEPTED
      - ACCEPTED_WITH_DEBT
      - FAILED
    responsible_roles:
      - agent_reflector
      - agent_improvement_designer
      - human

assumptions_and_tradeoffs:
  - Determinism is achieved by explicit artifacts and approvals, not by autonomous loops.
  - This file describes ordering and gate conditions only; execution is performed by humans/agents externally.
  - test_change_summary.md and implementation_summary.md are optional trace artifacts; omitting them
    does not block any gate but reduces reviewer input quality.
  - run_metrics.json is optional in delivery runs; it is required as input to the improvement cycle.

change_log:
  - version: v1
    date: "2026-03-12"
    change: "Updated post_workflow_activities.release to reference normative release_workflow.yaml (v1.1). Added post_workflow_activities.knowledge_extraction with explicit trigger states and responsible roles."
