project:
  name: "DevOS Runtime"
  summary: "Deterministic runtime engine implementing DevOS framework contracts"
  description: |
    DevOS Runtime is the deterministic workflow execution engine that enforces
    DevOS framework contracts.

    This project implements the runtime described in the Phase 3 Runtime
    Realization Plan.

    Package 1 implements the shared runtime type system used across the entire
    runtime architecture.

    These types represent the canonical domain structures for:

    - runs
    - workflows
    - artifacts
    - events
    - decisions
    - gate evaluation

  icon: ":gear:"
  color: "#4F46E5"
  priority: 2
  state: "planned"
  labels: ["platform"]

milestones:
  - name: "Runtime Prototype"
    description: "Minimal runtime capable of executing workflow transitions."

epics:

  - name: "Shared Runtime Types"
    description: |
      Implement the foundational type system used across the DevOS runtime.

      These types form the canonical runtime data structures used by all
      runtime modules.

      This layer must remain dependency-free so that it can serve as the
      stable base of the runtime architecture.

    priority: 2
    milestone: "Runtime Prototype"

    acceptance_criteria: |
      - [ ] All runtime type modules implemented
      - [ ] No runtime module dependencies introduced
      - [ ] Types usable by framework loaders and runtime engine
      - [ ] Domain objects remain immutable value structures

    stories:

      - name: "Run domain types"
        type: "story"
        description: |
          Implement the domain types representing runtime execution identity
          and lifecycle.

        problem_statement: |
          The runtime requires canonical data structures to represent
          run identity, lifecycle state, and runtime context.

        scope: |
          Define value objects representing runs and their lifecycle.

        constraints: |
          Types must be immutable and dependency-free.

        architecture_context: |
          runtime/types/run.py

        non_goals: |
          No runtime engine logic should be implemented here.

        design_freedom: "restricted"

        effort: 3
        complexity: 2

        acceptance_criteria: |
          - [ ] RunId implemented
          - [ ] RunState enum implemented
          - [ ] RunContext structure implemented
          - [ ] TERMINAL_STATES constant defined

        tasks:
          - name: "Implement RunId type"
            type: "task"
            description: |
              Value object representing the run identifier.

          - name: "Implement RunState enum"
            type: "task"
            description: |
              Enumeration representing workflow states.

          - name: "Implement RunContext structure"
            type: "task"
            description: |
              Immutable structure representing runtime execution context.

          - name: "Define TERMINAL_STATES constant"
            type: "task"
            description: |
              Canonical set of terminal workflow states.


      - name: "Workflow definition types"
        type: "story"
        description: |
          Implement runtime data structures representing workflow definitions.

        problem_statement: |
          Workflow definitions must be represented as typed structures
          after parsing workflow YAML files.

        scope: |
          Create structures for workflow definitions and transitions.

        constraints: |
          Types must map directly to workflow YAML schema.

        architecture_context: |
          runtime/types/workflow.py

        non_goals: |
          Workflow parsing logic.

        design_freedom: "restricted"

        effort: 3
        complexity: 3

        acceptance_criteria: |
          - [ ] WorkflowDefinition structure implemented
          - [ ] Transition structure implemented
          - [ ] RequiresBlock structure implemented

        tasks:
          - name: "Implement WorkflowDefinition class"
            type: "task"
            description: |
              Structure representing parsed workflow definitions.

          - name: "Implement Transition structure"
            type: "task"
            description: |
              Represents transitions between workflow states.

          - name: "Implement RequiresBlock structure"
            type: "task"
            description: |
              Represents workflow gate requirement blocks.


      - name: "Artifact domain types"
        type: "story"
        description: |
          Implement domain structures for runtime artifact identity
          and metadata.

        problem_statement: |
          Artifacts require canonical identifiers and references
          for validation, approval binding, and event emission.

        scope: |
          Define artifact identity and metadata structures.

        constraints: |
          Must support artifact hashing and approval binding.

        architecture_context: |
          runtime/types/artifact.py

        non_goals: |
          Artifact storage or validation logic.

        design_freedom: "restricted"

        effort: 3
        complexity: 3

        acceptance_criteria: |
          - [ ] ArtifactId type implemented
          - [ ] ArtifactRef implemented
          - [ ] ArtifactHash implemented
          - [ ] ArtifactStatus enum implemented

        tasks:
          - name: "Implement ArtifactId type"
            type: "task"
            description: |
              Unique identifier for artifacts.

          - name: "Implement ArtifactRef structure"
            type: "task"
            description: |
              Structure referencing artifacts.

          - name: "Implement ArtifactHash type"
            type: "task"
            description: |
              SHA-256 artifact hash representation.

          - name: "Implement ArtifactStatus enum"
            type: "task"
            description: |
              Artifact lifecycle states.


      - name: "Event model types"
        type: "story"
        description: |
          Implement canonical event structures used by the runtime
          event system.

        problem_statement: |
          The runtime must emit typed events representing execution
          progress and system actions.

        scope: |
          Implement event types and event envelope structure.

        constraints: |
          Must comply with DevOS event model specification.

        architecture_context: |
          runtime/types/event.py

        non_goals: |
          Event persistence or event emission logic.

        design_freedom: "restricted"

        effort: 3
        complexity: 3

        acceptance_criteria: |
          - [ ] EventType enum implemented
          - [ ] EventEnvelope structure implemented

        tasks:
          - name: "Implement EventType enum"
            type: "task"
            description: |
              Enumeration of runtime event types.

          - name: "Implement EventEnvelope structure"
            type: "task"
            description: |
              Canonical event envelope structure.


      - name: "Decision domain types"
        type: "story"
        description: |
          Implement runtime structures representing decisions recorded
          in decision_log.yaml.

        problem_statement: |
          Runtime components require typed representations of decisions
          recorded in the decision log.

        scope: |
          Implement structures representing decision entries.

        constraints: |
          Must support artifact approval binding.

        architecture_context: |
          runtime/types/decision.py

        non_goals: |
          Decision processing logic.

        design_freedom: "restricted"

        effort: 2
        complexity: 2

        acceptance_criteria: |
          - [ ] DecisionEntry implemented
          - [ ] DecisionType enum implemented
          - [ ] DecisionReference implemented

        tasks:
          - name: "Implement DecisionType enum"
            type: "task"
            description: |
              Enumeration of decision types.

          - name: "Implement DecisionEntry structure"
            type: "task"
            description: |
              Structure representing entries from decision_log.yaml.

          - name: "Implement DecisionReference structure"
            type: "task"
            description: |
              Artifact references used for approval binding.


      - name: "Gate evaluation types"
        type: "story"
        description: |
          Implement structures representing results of gate evaluation.

        problem_statement: |
          Gate evaluation must return structured validation results
          used by the workflow engine and event system.

        scope: |
          Define types representing gate evaluation results.

        constraints: |
          Must support deterministic evaluation output.

        architecture_context: |
          runtime/types/gate.py

        non_goals: |
          Gate evaluation logic.

        design_freedom: "restricted"

        effort: 2
        complexity: 2

        acceptance_criteria: |
          - [ ] GateResult implemented
          - [ ] GateCheckDetail implemented
          - [ ] CheckType enum implemented
          - [ ] CheckResult enum implemented

        tasks:
          - name: "Implement CheckType enum"
            type: "task"
            description: |
              Types of gate checks.

          - name: "Implement CheckResult enum"
            type: "task"
            description: |
              Possible outcomes of gate checks.

          - name: "Implement GateCheckDetail structure"
            type: "task"
            description: |
              Structure describing individual gate checks.

          - name: "Implement GateResult structure"
            type: "task"
            description: |
              Aggregated result of gate evaluation.